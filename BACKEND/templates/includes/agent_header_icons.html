{% load static %}
{# Use in header-right: pass notification_count, chat_count, reviews_count (optional). #}
<a href="{% url 'agent_bookings' %}" class="header-nav-icon" title="Bookings & notifications" aria-label="Bookings">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    {% if notification_count %}
    <span class="header-nav-badge">{{ notification_count }}</span>
    {% endif %}
</a>
<a href="{% url 'agent_chat' %}" class="header-nav-icon" title="Chat" aria-label="Chat">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    {% if chat_count %}
    <span class="header-nav-badge">{{ chat_count }}</span>
    {% endif %}
</a>
<a href="{% url 'agent_reviews' %}" class="header-nav-icon" title="Reviews" aria-label="Reviews">
