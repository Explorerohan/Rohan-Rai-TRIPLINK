# Render Blueprint: TRIPLINK Django API
# New → Blueprint → Connect this repo → Render reads this file.
# Then add a PostgreSQL instance in the dashboard and set DATABASE_URL on this service.

services:
  - type: web
    name: triplink-api
    runtime: python
    plan: free
    rootDir: BACKEND
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_SSL_REQUIRE
        value: "true"
      # Free tier blocks SMTP (25/465/587). Add RESEND_API_KEY + RESEND_FROM_EMAIL (verified domain or
      # onboarding@resend.dev for tests) in the dashboard — Resend cannot send as @gmail.com.
      # Persist uploads across deploys: add AWS_* vars for S3/R2 (see BACKEND/RENDER_DEPLOY.txt), or
      # on a paid instance attach a disk and set MEDIA_ROOT to the mount path.
